<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Carlos Odette</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">&lt;/&gt;CO</div>
        <ul class="nav-links">
            <li><a href="#hero-section">Inicio</a></li>
            <li><a href="#experience">Experiencia</a></li>
            <li><a href="#projects">Proyectos</a></li>
            <li><a href="#about">Sobre mi</a></li>
            <li><a href="#contact">Contáctame</a></li>
        </ul>
    </nav>

    <header class="hero" id="hero-section">
        <div class="hero-content">
            <h1 id="hero-name">Cargando...</h1>
            <h2 id="hero-title">Cargando...</h2>
            <p id="hero-desc">Cargando información del perfil...</p>
            <div class="hero-buttons">
                <button class="btn btn-light">Ver Proyectos</button>
                <button class="btn btn-outline">Contactar</button>
            </div>
        </div>
        <div class="hero-image">
            <img id="hero-img" src="" alt="Perfil">
        </div>
    </header>

    <section class="dynamic-menu-section">
        <div class="menu-card">
            <div class="grid-container" id="app-grid">
                </div>
        </div>
    </section>

    <section class="experience-section" id="experience">
        <h3 class="section-title">Experiencia Profesional</h3>
        <div class="timeline" id="experience-timeline">
            </div>
    </section>

    <section class="projects-section" id="projects">
        <h3 class="section-title">Proyectos Destacados</h3>
        <div class="projects-grid" id="projects-grid">
            </div>
    </section>

    <section class="about-section" id="about">
        <h3 class="section-title">Sobre Mí</h3>
        <div class="about-content">
            <p id="about-text">Cargando información...</p>
        </div>
    </section>

    <section class="contact-section" id="contact">
        <h3 class="section-title">Contáctame</h3>
        <div class="contact-container">
            <form class="contact-form">
                <input type="text" placeholder="Tu Nombre" required>
                <input type="email" placeholder="Tu Correo" required>
                <textarea rows="5" placeholder="¿En qué puedo ayudarte?" required></textarea>
                <button type="submit" class="btn btn-submit">Enviar Mensaje</button>
            </form>
        </div>
    </section>

    <script src="js/app.js"></script>
</body>
</html>
