<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Gasto - Mis Deudas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#000279',
                            800: '#002890',
                            600: '#284ca8',
                            400: '#897dc0',
                            200: '#c6b3d9',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen overflow-hidden">

    <!-- Menú Lateral (SOLO PC) -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-100 shadow-sm z-20">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-brand-900"><i class="fa-solid fa-wallet mr-2"></i>MisDeudas</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="inicio.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-brand-600 rounded-xl transition-all">
                <i class="fa-solid fa-house"></i> Inicio
            </a>
            <a href="historial.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-brand-600 rounded-xl transition-all">
                <i class="fa-solid fa-clock-rotate-left"></i> Historial
            </a>
            <a href="agregar-compra.html" class="flex items-center gap-3 px-4 py-3 bg-brand-900 text-white rounded-xl shadow-md shadow-brand-400/30 transition-all">
                <i class="fa-solid fa-plus-circle"></i> Nuevo Gasto
            </a>
        </nav>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 h-full overflow-y-auto relative pb-24 md:pb-6">
        
        <!-- Header Móvil -->
        <header class="md:hidden bg-white p-6 rounded-b-3xl shadow-sm border-b border-slate-100 sticky top-0 z-10 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h1 class="text-xl font-bold text-brand-900">Agregar Compra</h1>
            </div>
        </header>

        <div class="p-6 max-w-2xl mx-auto space-y-6">
            
            <!-- Header PC -->
            <div class="hidden md:flex items-center gap-4 mb-8 mt-4">
                <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-slate-500 hover:text-brand-900 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div>
                    <p class="text-slate-400 font-medium">Registro manual</p>
                    <h2 class="text-3xl font-bold text-brand-900">Agregar Compra</h2>
                </div>
            </div>

            <!-- Formulario Principal -->
            <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-100">
                <form id="formNuevaCompra" class="space-y-5">
                    
                    <!-- Concepto -->
                    <div>
                        <label for="concepto" class="block text-sm font-medium text-slate-700 mb-1">Concepto</label>
                        <input type="text" id="concepto" name="concepto" required placeholder="Ej. Despensa, Audífonos..." 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all placeholder:text-slate-300">
                    </div>

                    <!-- Tipo y Monto (Grid de 2 columnas en pantallas medianas) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label for="tipo" class="block text-sm font-medium text-slate-700 mb-1">Tipo de Gasto</label>
                            <div class="relative">
                                <select id="tipo" name="tipo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all appearance-none bg-white">
                                    <option value="" disabled >Selecciona un tipo...</option>
                                    <option value="Gasto extra" selected>Gasto extra</option>
                                    <option value="Gasto Fijo">Gasto Fijo</option>
                                    <option value="A meses">A meses</option>
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                        
                        <div>
                            <label for="monto" class="block text-sm font-medium text-slate-700 mb-1">Monto ($)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
                                <input type="number" id="monto" name="monto" step="0.01" min="0.01" required placeholder="0.00" 
                                    class="w-full pl-8 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <!-- Celda Oculta: Meses Restantes -->
                    <div id="contenedorMeses" class="hidden overflow-hidden transition-all duration-300">
                        <label for="meses_restantes" class="block text-sm font-medium text-brand-600 mb-1">Meses Restantes</label>
                        <input type="number" id="meses_restantes" name="meses_restantes" min="1" max="48" placeholder="Ej. 12" 
                            class="w-full px-4 py-3 rounded-xl border border-brand-200 bg-brand-50 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all">
                    </div>

                    <!-- Fecha y Comprador (Grid de 2 columnas) -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label for="fecha" class="block text-sm font-medium text-slate-700 mb-1">Fecha</label>
                            <input type="date" id="fecha" name="fecha" required 
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all text-slate-700">
                        </div>

                        <div>
                            <label for="comprador" class="block text-sm font-medium text-slate-700 mb-1">Compra realizada por</label>
                            <div class="relative">
                                <select id="comprador" name="comprador" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-400 focus:border-brand-400 outline-none transition-all appearance-none bg-white">
                                    <option value="" disabled>Cargando usuarios...</option>
                                    <!-- Las opciones se inyectan vía HTTP GET -->
                                </select>
                                <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Botón Submit -->
                    <div class="pt-4">
                        <button type="submit" id="btnGuardar" class="w-full py-4 bg-brand-900 hover:bg-brand-800 text-white font-bold rounded-xl shadow-lg shadow-brand-900/20 transition-all flex justify-center items-center gap-2">
                            <i class="fa-solid fa-check"></i> Registrar Compra
                        </button>
                    </div>

                    <!-- Mensaje de estado -->
                    <div id="mensajeEstado" class="hidden text-center text-sm font-medium p-3 rounded-lg mt-4"></div>

                </form>
            </div>
        </div>
    </main>

    <!-- Menú Inferior (SOLO MÓVIL) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-brand-900 text-brand-200 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-50">
        <div class="flex justify-around items-center h-20 px-4 relative">
            <a href="inicio.html" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-house text-xl mb-1"></i>
            </a>
            <a href="historial.html" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-table-cells-large text-xl mb-1"></i>
            </a>
            
            <div class="relative -top-6">
                <button class="w-14 h-14 bg-brand-400 text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-brand-400/50 border-4 border-brand-900 transform transition active:scale-95">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            
            <a href="agregar-compra.html" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
            </a>
            <a href="https://software-odette.netlify.app/" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-user text-xl mb-1"></i>
            </a>
        </div>
    </nav>

    <!-- Lógica JavaScript (HTTP GET, HTTP POST y UI Dynamics) -->
    <script src="./js/agregar-compra-logica.js" type="module"></script>
</body>
</html>
