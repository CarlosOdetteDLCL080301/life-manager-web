<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Deudas - Billetera</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            900: '#000279',
                            800: '#002890',
                            600: '#284ca8',
                            400: '#897dc0',
                            200: '#c6b3d9',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased flex h-screen overflow-hidden">

    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-slate-100 shadow-sm z-20">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-brand-900"><i class="fa-solid fa-wallet mr-2"></i>MisDeudas</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="inicio.html" class="flex items-center gap-3 px-4 py-3 bg-brand-900 text-white rounded-xl shadow-md shadow-brand-400/30 transition-all">
                <i class="fa-solid fa-house"></i> Inicio
            </a>
            <a href="historial.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-brand-600 rounded-xl transition-all">
                <i class="fa-solid fa-clock-rotate-left"></i> Historial
            </a>
            <a href="agregar-compra.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:bg-slate-50 hover:text-brand-600 rounded-xl transition-all">
                <i class="fa-solid fa-plus-circle"></i> Nuevo Gasto
            </a>
        </nav>
        <div class="p-4 border-t border-slate-100">
            <button class="flex items-center gap-3 px-4 py-2 w-full text-left text-slate-500 hover:text-brand-900 transition-all">
                <i class="fa-solid fa-user-circle text-xl"></i> Perfil
            </button>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto no-scrollbar relative pb-24 md:pb-6">
        
        <header class="md:hidden bg-white p-6 rounded-b-3xl shadow-sm border-b border-slate-100 sticky top-0 z-10 flex justify-between items-center">
            <div>
                <p class="text-sm text-slate-400 font-medium">Bienvenido de vuelta</p>
                <h1 class="text-xl font-bold text-brand-900">Hola, Odette</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-brand-200 text-brand-900 flex items-center justify-center font-bold">
                OD
            </div>
        </header>

        <div class="p-6 max-w-4xl mx-auto space-y-6">
            
            <div class="hidden md:flex justify-between items-end mb-8 mt-4">
                <div>
                    <p class="text-slate-400 font-medium">Resumen financiero</p>
                    <h2 class="text-3xl font-bold text-brand-900">Hola, Odette</h2>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                <h3 class="w-full text-left font-semibold text-slate-700 mb-2">Saldo Libre</h3>
                <div class="relative w-48 h-48 sm:w-64 sm:h-64">
                    <canvas id="walletChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span id="porcentajeCentro" class="text-4xl sm:text-5xl font-bold text-brand-900">--%</span>
                        <span class="text-xs sm:text-sm text-slate-400 flex items-center gap-1">
                            <i class="fa-solid fa-arrow-trend-up"></i> alcanzado
                        </span>
                    </div>
                </div>
                
                <div class="flex gap-4 mt-6">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-brand-600"></span>
                        <span class="text-sm font-medium text-slate-600">Mensualidades</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-brand-400"></span>
                        <span class="text-sm font-medium text-slate-600">Compras</span>
                    </div>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-slate-700">Historial Reciente</h3>
                    <button class="text-sm text-brand-600 font-medium hover:text-brand-800">Ver todo</button>
                </div>
                
                <div id="historialContainer" class="space-y-3">
                    <p class="text-center text-slate-400 py-4"><i class="fa-solid fa-spinner fa-spin"></i> Cargando...</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-brand-900 text-brand-200 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-50">
        <div class="flex justify-around items-center h-20 px-4 relative">
            <a href="inicio.html" class="flex flex-col items-center text-white w-12 transition-all">
                <i class="fa-solid fa-house text-xl mb-1"></i>
            </a>
            <a href="historial.html" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-table-cells-large text-xl mb-1"></i>
            </a>
            
            <div class="relative -top-6">
                <button class="w-14 h-14 bg-brand-400 text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-brand-400/50 border-4 border-brand-900 transform transition active:scale-95 hover:bg-brand-200 hover:text-brand-900">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
            
            <a href="agregar-compra.html" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i>
            </a>
            <a href="https://software-odette.netlify.app/" class="flex flex-col items-center hover:text-white w-12 transition-all">
                <i class="fa-solid fa-user text-xl mb-1"></i>
            </a>
        </div>
    </nav>

    <script>
        const API_URL = ""; 

        // MOCK de datos modificado (eliminado el campo 'icono' y 'tipo' que ya no usaremos en el diseño)
        const mockResponse = {
            resumen: {
                porcentajeLibre: 88,
                totalMensualidades: 4500.00,
                totalCompras: 1200.00
            },
            historial: [
                { id: 1, concepto: 'Red Dead Redemption 2', fecha: '29/Junio', costo: 850.00 },
                { id: 2, concepto: 'Comida', fecha: '20/Junio', costo: 200.00 },
                { id: 3, concepto: 'Protector de radios bici', fecha: '15/Junio', costo: 350.00 },
                { id: 4, concepto: 'Cita', fecha: '10/Junio', costo: 600.00 }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            cargarDatosDashboard();
        });

        async function cargarDatosDashboard() {
            let data = mockResponse;

            if (API_URL !== "") {
                try {
                    const response = await fetch(API_URL);
                    if (response.ok) {
                        data = await response.json();
                    } else {
                        console.warn("API falló, usando MOCK data.");
                    }
                } catch (error) {
                    console.error("Error conectando a la API, usando MOCK data:", error);
                }
            }

            renderizarGrafica(data.resumen);
            renderizarHistorial(data.historial);
        }

        function renderizarGrafica(resumen) {
            document.getElementById('porcentajeCentro').innerText = `${resumen.porcentajeLibre}%`;
            const ctx = document.getElementById('walletChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Mensualidades', 'Compras', 'Libre'],
                    datasets: [{
                        data: [
                            resumen.totalMensualidades, 
                            resumen.totalCompras, 
                            (resumen.totalMensualidades + resumen.totalCompras) * (resumen.porcentajeLibre / (100 - resumen.porcentajeLibre))
                        ],
                        backgroundColor: ['#284ca8', '#897dc0', '#f1f5f9'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '80%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    if(context.label === 'Libre') return ' Saldo Libre';
                                    return ` $${context.raw.toFixed(2)}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderizarHistorial(historial) {
            const container = document.getElementById('historialContainer');
            container.innerHTML = ''; 

            if (historial.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-4">No hay movimientos recientes.</p>';
                return;
            }

            historial.forEach(item => {
                const costoFormateado = new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(item.costo);
                
                // Diseño de la tarjeta simplificado, puramente tipográfico
                const htmlItem = `
                    <div class="bg-white px-5 py-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between hover:shadow-md transition-shadow cursor-pointer">
                        <div>
                            <h4 class="font-bold text-slate-700 text-base">${item.concepto}</h4>
                            <p class="text-sm text-slate-400 mt-0.5">${item.fecha}</p>
                        </div>
                        <div class="text-right pl-4">
                            <span class="font-bold text-brand-900 text-lg">${costoFormateado}</span>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', htmlItem);
            });
        }
    </script>
</body>
</html>
